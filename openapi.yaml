openapi: 3.0.3
info:
  title: Figurinhas Copa do Mundo 2026 API
  description: |
    API para gerenciar o seu álbum de figurinhas da **Copa do Mundo 2026** 🏆⚽

    Com essa API você pode:
    - Cadastrar figurinhas que você possui
    - Listar todas as figurinhas do álbum
    - Buscar uma figurinha específica
    - Marcar figurinhas como repetidas
    - Remover figurinhas do álbum

    ## Autenticação
    Essa API utiliza autenticação via **API Key** no header `x-api-key`.

    ## Códigos de Figurinhas
    Cada figurinha possui um código no formato `GRP-NNN` onde:
    - `GRP` = código do grupo/seleção (ex: `BRA`, `ARG`, `FRA`)
    - `NNN` = número da figurinha (ex: `001`, `042`)
  version: 1.0.0
  contact:
    name: Suporte Copa 2026 API
    email: suporte@copa2026api.dev
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api/v1
    description: Servidor local de desenvolvimento
  - url: https://api.copa2026.dev/v1
    description: Servidor de produção

tags:
  - name: Figurinhas
    description: Operações de CRUD para figurinhas do álbum
  - name: Estatísticas
    description: Contagens e estatísticas do álbum

paths:
  /figurinhas:
    get:
      tags:
        - Figurinhas
      summary: Listar todas as figurinhas
      description: |
        Retorna a lista completa de figurinhas do seu álbum.
        É possível filtrar por seleção, raridade ou se é repetida.
      operationId: listarFigurinhas
      parameters:
        - name: selecao
          in: query
          description: Filtrar figurinhas por código de seleção (ex: BRA, ARG)
          required: false
          schema:
            type: string
            example: BRA
        - name: repetida
          in: query
          description: Filtrar apenas figurinhas repetidas ou não repetidas
          required: false
          schema:
            type: boolean
            example: true
        - name: raridade
          in: query
          description: Filtrar por nível de raridade
          required: false
          schema:
            type: string
            enum: [comum, rara, especial, lendaria]
      responses:
        "200":
          description: Lista de figurinhas retornada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    example: 42
                  figurinhas:
                    type: array
                    items:
                      $ref: "#/components/schemas/Figurinha"
              example:
                total: 2
                figurinhas:
                  - id: "fig_001"
                    codigo: "BRA-010"
                    jogador: "Vinicius Jr."
                    selecao: "Brasil"
                    posicao: "Atacante"
                    raridade: "lendaria"
                    repetida: false
                    quantidade: 1
                    criadoEm: "2025-05-01T10:00:00Z"
                  - id: "fig_002"
                    codigo: "ARG-010"
                    jogador: "Lionel Messi"
                    selecao: "Argentina"
                    posicao: "Atacante"
                    raridade: "lendaria"
                    repetida: true
                    quantidade: 3
                    criadoEm: "2025-05-02T14:30:00Z"
        "500":
          $ref: "#/components/responses/ErroInterno"

    post:
      tags:
        - Figurinhas
      summary: Cadastrar nova figurinha
      description: |
        Adiciona uma nova figurinha ao seu álbum.
        Se a figurinha já existir (mesmo código), a quantidade é incrementada automaticamente e ela é marcada como repetida.
      operationId: cadastrarFigurinha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FigurinhaInput"
            example:
              codigo: "BRA-010"
              jogador: "Vinicius Jr."
              selecao: "Brasil"
              posicao: "Atacante"
              raridade: "lendaria"
      responses:
        "201":
          description: Figurinha cadastrada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensagem:
                    type: string
                    example: "Figurinha cadastrada com sucesso!"
                  figurinha:
                    $ref: "#/components/schemas/Figurinha"
        "400":
          $ref: "#/components/responses/ErroBadRequest"
        "500":
          $ref: "#/components/responses/ErroInterno"

  /figurinhas/{id}:
    get:
      tags:
        - Figurinhas
      summary: Buscar figurinha por ID
      description: Retorna os detalhes de uma figurinha específica pelo seu ID.
      operationId: buscarFigurinhaPorid
      parameters:
        - $ref: "#/components/parameters/FigurinhaId"
      responses:
        "200":
          description: Figurinha encontrada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Figurinha"
              example:
                id: "fig_001"
                codigo: "BRA-010"
                jogador: "Vinicius Jr."
                selecao: "Brasil"
                posicao: "Atacante"
                raridade: "lendaria"
                repetida: false
                quantidade: 1
                criadoEm: "2025-05-01T10:00:00Z"
        "404":
          $ref: "#/components/responses/ErroNaoEncontrado"
        "500":
          $ref: "#/components/responses/ErroInterno"

    delete:
      tags:
        - Figurinhas
      summary: Remover figurinha do álbum
      description: |
        Remove uma figurinha do álbum pelo ID.
        Se a figurinha tiver quantidade maior que 1 (repetidas), apenas decrementa a quantidade.
        Se tiver apenas 1 unidade, remove completamente do álbum.
      operationId: removerFigurinha
      parameters:
        - $ref: "#/components/parameters/FigurinhaId"
        - name: removerTodas
          in: query
          description: Se true, remove todas as cópias da figurinha de uma vez
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Figurinha removida com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensagem:
                    type: string
                    example: "Figurinha removida com sucesso!"
                  figurinhaRemovida:
                    type: boolean
                    description: true se removida completamente, false se apenas decrementou
                    example: true
        "404":
          $ref: "#/components/responses/ErroNaoEncontrado"
        "500":
          $ref: "#/components/responses/ErroInterno"

  /figurinhas/repetidas/contagem:
    get:
      tags:
        - Estatísticas
      summary: Contar figurinhas repetidas
      description: |
        Retorna a contagem total de figurinhas repetidas no álbum,
        agrupadas por seleção para facilitar as trocas com amigos!
      operationId: contarRepetidas
      responses:
        "200":
          description: Contagem de repetidas retornada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalRepetidas:
                    type: integer
                    description: Quantidade total de figurinhas repetidas
                    example: 15
                  porSelecao:
                    type: array
                    items:
                      type: object
                      properties:
                        selecao:
                          type: string
                          example: "Brasil"
                        quantidade:
                          type: integer
                          example: 5
              example:
                totalRepetidas: 15
                porSelecao:
                  - selecao: "Brasil"
                    quantidade: 5
                  - selecao: "Argentina"
                    quantidade: 4
                  - selecao: "França"
                    quantidade: 6
        "500":
          $ref: "#/components/responses/ErroInterno"

components:
  schemas:
    Figurinha:
      type: object
      description: Representa uma figurinha do álbum da Copa 2026
      properties:
        id:
          type: string
          description: Identificador único da figurinha
          example: "fig_001"
        codigo:
          type: string
          description: Código da figurinha no formato GRP-NNN
          pattern: "^[A-Z]{3}-[0-9]{3}$"
          example: "BRA-010"
        jogador:
          type: string
          description: Nome do jogador
          example: "Vinicius Jr."
        selecao:
          type: string
          description: Nome da seleção
          example: "Brasil"
        posicao:
          type: string
          description: Posição do jogador em campo
          enum: [Goleiro, Lateral, Zagueiro, Volante, Meia, Atacante]
          example: "Atacante"
        raridade:
          type: string
          description: Nível de raridade da figurinha
          enum: [comum, rara, especial, lendaria]
          example: "lendaria"
        repetida:
          type: boolean
          description: Indica se a figurinha está repetida no álbum
          example: false
        quantidade:
          type: integer
          description: Quantidade de cópias dessa figurinha que você tem
          minimum: 1
          example: 1
        criadoEm:
          type: string
          format: date-time
          description: Data e hora em que a figurinha foi cadastrada
          example: "2025-05-01T10:00:00Z"

    FigurinhaInput:
      type: object
      description: Dados para cadastrar uma nova figurinha
      required:
        - codigo
        - jogador
        - selecao
        - posicao
      properties:
        codigo:
          type: string
          description: Código da figurinha no formato GRP-NNN
          pattern: "^[A-Z]{3}-[0-9]{3}$"
          example: "BRA-010"
        jogador:
          type: string
          description: Nome do jogador
          example: "Vinicius Jr."
        selecao:
          type: string
          description: Nome da seleção
          example: "Brasil"
        posicao:
          type: string
          description: Posição do jogador em campo
          enum: [Goleiro, Lateral, Zagueiro, Volante, Meia, Atacante]
          example: "Atacante"
        raridade:
          type: string
          description: Nível de raridade da figurinha
          enum: [comum, rara, especial, lendaria]
          default: comum
          example: "lendaria"

    Erro:
      type: object
      properties:
        erro:
          type: string
          description: Código do erro
          example: "NAO_ENCONTRADO"
        mensagem:
          type: string
          description: Descrição do erro
          example: "Figurinha não encontrada"

  parameters:
    FigurinhaId:
      name: id
      in: path
      description: ID único da figurinha
      required: true
      schema:
        type: string
        example: "fig_001"

  responses:
    ErroBadRequest:
      description: Dados inválidos na requisição
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Erro"
          example:
            erro: "DADOS_INVALIDOS"
            mensagem: "O campo 'codigo' é obrigatório e deve seguir o formato GRP-NNN"

    ErroNaoEncontrado:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Erro"
          example:
            erro: "NAO_ENCONTRADO"
            mensagem: "Figurinha não encontrada"

    ErroInterno:
      description: Erro interno do servidor
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Erro"
          example:
            erro: "ERRO_INTERNO"
            mensagem: "Ocorreu um erro inesperado. Tente novamente."

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Chave de API para autenticação

security:
  - ApiKeyAuth: []
